# Watchtower — auto-updates Docker containers when new images are pushed
# Place at /volume1/docker/watchtower/docker-compose.yml on your NAS
#
# Polls ghcr.io every 30 minutes. When a new image is pushed for any of
# the watched containers, it pulls and recreates that container.
# Data volumes are preserved.

services:
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    environment:
      - TZ=Europe/Brussels
      - WATCHTOWER_CLEANUP=true
      # Check every 30 minutes (1800s) — balances freshness with NAS load.
      - WATCHTOWER_POLL_INTERVAL=1800
      # Alternative: run on a cron schedule instead of an interval.
      # - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_REVIVE_STOPPED=false
      - DOCKER_API_VERSION=1.43
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # List every container watchtower should monitor (space-separated).
    command: swipefi bidwize-immo
    restart: unless-stopped
