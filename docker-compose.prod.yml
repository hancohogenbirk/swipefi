# SwipeFi — Production compose for Synology Container Manager
#
# Setup:
#   1. Create folder /volume1/docker/swipefi/data in File Station
#   2. Container Manager → Project → Create
#   3. Project name: swipefi, Path: /volume1/docker/swipefi
#   4. Source: "Create docker-compose.yml" → paste this file
#   5. Replace hancohogenbirk with your GitHub username
#   6. Click Next → Done
#
# The app will be at http://your-nas:8080
# In Settings, set music dir to /audio/Lossless/FLAC (or wherever your music is)

services:
  swipefi:
    image: ghcr.io/hancohogenbirk/swipefi:latest
    container_name: swipefi
    pull_policy: always
    network_mode: host  # Required for UPnP/SSDP multicast (DLNA renderer discovery)
    volumes:
      - /volume1/audio:/audio               # NAS audio share → /audio in container
      - /volume1/docker/swipefi/data:/data   # SQLite database persistence
    environment:
      - SWIPEFI_PORT=8080
      - SWIPEFI_DATA_DIR=/data
    restart: unless-stopped
